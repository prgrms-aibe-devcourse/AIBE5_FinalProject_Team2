# Alpha-Helix 자동 배포
# Host Nginx(80/443) -> frontend(127.0.0.1:3000)
# Host Nginx /api -> backend(127.0.0.1:9091)
# Docker 내부 통신:
#   frontend -> backend:9091
#   backend -> analytics:8001
#   backend -> db:3306

services:

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpw-change-me}
      MYSQL_DATABASE: ${DB_NAME:-alphahelix_db}
      MYSQL_USER: ${DB_USERNAME:-alpha}
      MYSQL_PASSWORD: ${DB_PASSWORD:-alphapw}
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 40s
    restart: unless-stopped

  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    environment:
      ANALYTICS_INTERNAL_TOKEN: ${ANALYTICS_INTERNAL_TOKEN:-dev-internal-token-change-me}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      PRICE_CACHE_TTL_MIN: ${PRICE_CACHE_TTL_MIN:-360}
    volumes:
      - price_cache:/app/cache
    expose:
      - "8001"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "120000"

      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-alphahelix_db}
      DB_USERNAME: ${DB_USERNAME:-alpha}
      DB_PASSWORD: ${DB_PASSWORD:-alphapw}

      JWT_SECRET: ${JWT_SECRET:-}
      APP_CRYPTO_KEY: ${APP_CRYPTO_KEY:-}
      APPROVAL_HMAC_SECRET: ${APPROVAL_HMAC_SECRET:-}

      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}

      ANALYTICS_BASE_URL: http://analytics:8001
      ANALYTICS_INTERNAL_TOKEN: ${ANALYTICS_INTERNAL_TOKEN:-dev-internal-token-change-me}

      CLAUDE_CLI_ENABLED: "true"
      DEVELOPER_ALLOWLIST: ${DEVELOPER_ALLOWLIST:-}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://www.quant-alphahelix.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://www.quant-alphahelix.com}

      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-https://www.quant-alphahelix.com/oauth/github/callback}

      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY:-}
      TOSS_WEBHOOK_SECRET: ${TOSS_WEBHOOK_SECRET:-}

      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}

      STREAM_CHAT_API_KEY: ${STREAM_CHAT_API_KEY:-}
      STREAM_CHAT_API_SECRET: ${STREAM_CHAT_API_SECRET:-}


    volumes:
      - claude_home:/home/app/.claude
      - uploads:/var/devbridge/uploads

    depends_on:
      db:
        condition: service_healthy
      analytics:
        condition: service_started

    expose:
      - "9091"

    ports:
      - "127.0.0.1:9091:9091"

    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9091/actuator/health | grep -q status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_GITHUB_CLIENT_ID: ${VITE_GITHUB_CLIENT_ID:-}
        VITE_GITHUB_REDIRECT_URI: ${VITE_GITHUB_REDIRECT_URI:-https://www.quant-alphahelix.com/oauth/github/callback}
        VITE_KAKAO_REST_KEY: ${VITE_KAKAO_REST_KEY:-}
        VITE_TOSS_CLIENT_KEY: ${VITE_TOSS_CLIENT_KEY:-}
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  db_data:
  price_cache:
  claude_home:
  uploads:
