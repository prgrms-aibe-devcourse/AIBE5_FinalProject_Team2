server {
    listen 80;
    listen [::]:80;
    server_name who-a.com www.who-a.com;

    client_max_body_size 50M;

    # ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/who-a;
    }

    # frontend SPA
    root /var/www/who-a;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE 스트리밍 엔드포인트 — proxy_buffering off 필수 (버퍼에 쌓이면 토큰 전달 안 됨)
    location ~ ^/api/(notifications/stream|alpha/workspaces/[^/]+/chat/stream) {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
    }

    # 브리핑 — Perplexity 실시간 검색 + AI 분석으로 응답이 길어질 수 있음.
    # 일반 /api/ 의 120s 로는 백엔드(read 120s)+오버헤드 시 504 가 나므로 프론트 axios(200s)보다 큰 240s 적용.
    # (regex location 은 prefix location /api/ 보다 우선 매칭됨)
    location ~ ^/api/alpha/workspaces/[^/]+/briefing {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 240s;
    }

    # Spring Boot API
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    # uploads (Spring serves /uploads)
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # FastAPI analytics
    location /analytics/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }
}
