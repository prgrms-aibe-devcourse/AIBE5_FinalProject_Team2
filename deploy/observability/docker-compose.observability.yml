# Alpha-Helix 관측성 스택 — Prometheus + Grafana
#
# 띄우기:
#   cd deploy/observability
#   docker compose -f docker-compose.observability.yml up -d
#
# 접속:
#   - Prometheus : http://localhost:9090
#   - Grafana    : http://localhost:3000  (초기 계정 admin / admin → 최초 로그인 시 변경 권장)
#
# 사전조건: 백엔드(:8080, eden 로컬이면 :9091)가 떠 있고 /actuator/prometheus 가 응답해야 한다.
#   확인: curl http://localhost:8080/actuator/prometheus | head
#
# Grafana 는 provisioning 으로 Prometheus 데이터소스 + Alpha-Helix 대시보드를 자동 로드한다.
# (수동 import 가 필요하면 README.md 참고)

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: alpha-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    # Linux 호스트에서 host.docker.internal 을 호스트 게이트웨이로 매핑(Docker Desktop 은 자동).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: alpha-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      # 데이터소스 자동 프로비저닝
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      # 대시보드 자동 프로비저닝(프로바이더 정의 + 대시보드 JSON)
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-dashboard-alpha.json:/var/lib/grafana/dashboards/grafana-dashboard-alpha.json:ro
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
