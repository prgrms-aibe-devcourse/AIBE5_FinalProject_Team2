# Grafana 데이터소스 자동 프로비저닝 — Prometheus 연결
# docker-compose.observability.yml 의 prometheus 서비스를 가리킨다(같은 compose 네트워크).
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: prometheus          # 대시보드 JSON 이 datasource uid="prometheus" 로 참조함
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s      # prometheus.yml 의 scrape_interval 과 일치
